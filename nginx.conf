server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location ^~ /api {
        return 404;
    }

    location / {
        try_files $uri /index.html;
    }
}
